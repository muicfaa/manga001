<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
  <title>EGG-SAPIEN(半卵人)</title>
  <style>
    :root { --accent: #e69039; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    header {
      background: #111;
      padding: 1rem 2rem;
      border-bottom: 4px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { height: 70px; width: 70px; border: 3px solid var(--accent); border-radius: 12px; object-fit: contain; cursor: pointer; }

    h1 { font-size: 2.4rem; font-weight: 900; letter-spacing: -1px; cursor: pointer; }

    .page { display: none; }
    .page.active { display: block; }

    /* Reader */
    #reader-page {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      flex-direction: column;
      overscroll-behavior: none; /* helps reduce flash */
    }
    #reader-page.active { display: flex; }

    .reader-header {
      background: #111;
      border-bottom: 3px solid var(--accent);
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      position: relative;
    }
    .reader-progress {
      position: absolute;
      bottom: -3px;
      left: 0;
      height: 3px;
      background: var(--accent);
      transition: width 0.15s linear;
    }

    .reader-img-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #000;
      cursor: pointer;
      touch-action: pinch-zoom;
    }
    .reader-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      transform: translateZ(0);
      will-change: transform;
      backface-visibility: hidden;
    }

    .reader-nav {
      display: flex;
      background: #111;
      border-top: 2px solid #222;
      flex-shrink: 0;
    }
    .reader-nav-btn {
      flex: 1;
      padding: 18px 0;
      background: #111;
      border: none;
      color: #aaa;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
    }
    .reader-nav-btn:hover { background: #1e1e1e; color: var(--accent); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <img src="icon1.jpg" alt="Logo" class="logo" onclick="showPage('home')">
    <h1 onclick="showPage('home')">MANGA</h1>
  </header>

  <!-- Your home / series pages go here (keep them as they are) -->

  <!-- READER -->
  <div id="reader-page">
    <div class="reader-header">
      <img src="icon1.jpg" alt="Logo" class="logo" onclick="exitReader()">
      <h1 onclick="exitReader(); showPage('home');">MANGA</h1>
      <div style="margin-left:auto; font-size:0.95rem; color:#888;" id="page-counter">1 / 14</div>
      <div class="reader-progress" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="reader-img-wrap" onclick="nextPage()">
      <img id="reader-img" class="reader-img" alt="Manga Page">
    </div>

    <div class="reader-nav">
      <button class="reader-nav-btn" onclick="prevPage()">← Previous</button>
      <div style="width:1px; background:#222"></div>
      <button class="reader-nav-btn" onclick="nextPage()">Next →</button>
    </div>
  </div>

  <script>
    const chapters = [
      {
        id: 1,
        title: "第一話：サービスショットあり",
        series: 1,
        thumb: "icon2.jpg",
        pages: Array.from({length: 14}, (_, i) => `${i+1}.jpg`)
      }
      // Add next chapter like this:
      // {
      //   id: 2,
      //   title: "第二話：タイトル",
      //   series: 1,
      //   thumb: "icon3.jpg",
      //   pages: Array.from({length: 17}, (_, i) => `${i + 15}.jpg`)  // starts from 15.jpg
      // }
    ];

    let currentChapterIndex = 0;
    let currentPage = 0;

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const page = document.getElementById(pageId);
      if (page) page.classList.add('active');
      window.scrollTo(0, 0);
    }

    function startReading(chapterIndex) {
      currentChapterIndex = chapterIndex;
      currentPage = 0;
      document.getElementById('reader-page').classList.add('active');
      loadCurrentPage();
    }

    function exitReader() {
      document.getElementById('reader-page').classList.remove('active');
    }

    function loadCurrentPage() {
      const chapter = chapters[currentChapterIndex];
      const img = document.getElementById('reader-img');
      
      img.src = chapter.pages[currentPage];
      
      document.getElementById('page-counter').textContent = 
        `${currentPage + 1} / ${chapter.pages.length}`;
      
      document.getElementById('progress-bar').style.width = 
        `${((currentPage + 1) / chapter.pages.length) * 100}%`;

      // Preload next page
      if (currentPage + 1 < chapter.pages.length) {
        const preload = new Image();
        preload.src = chapter.pages[currentPage + 1];
      }
    }

    function nextPage() {
      const chapter = chapters[currentChapterIndex];
      if (currentPage < chapter.pages.length - 1) {
        currentPage++;
        loadCurrentPage();
      } else {
        exitReader();
      }
    }

    function prevPage() {
      if (currentPage > 0) {
        currentPage--;
        loadCurrentPage();
      } else {
        exitReader();
      }
    }

    // Keyboard - Japanese style (Left = Next)
    document.addEventListener('keydown', e => {
      if (!document.getElementById('reader-page').classList.contains('active')) return;
      
      if (e.key === 'ArrowLeft' || e.key === ' ') nextPage();
      if (e.key === 'ArrowRight') prevPage();
      if (e.key === 'Escape') exitReader();
    });

    // Click on image = next page (already set in HTML)

    // Initialize
    showPage('home');
  </script>
</body>
</html>
