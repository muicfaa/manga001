<!DOCTYPE html>
<html lang="ja" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Comic Archive</title>
  <style>
    :root { --accent: #e69039; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0f0f0f;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    header {
      background: #111;
      padding: 1rem 2rem;
      border-bottom: 4px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    .logo { height: 70px; width: 70px; border: 3px solid var(--accent); border-radius: 12px; object-fit: contain; }
    h1 { font-size: 2.4rem; font-weight: 900; letter-spacing: -1px; }

    .nav { margin-left: auto; display: flex; gap: 1rem; flex-wrap: wrap; }
    button {
      background: #222;
      color: #eee;
      border: 2px solid var(--accent);
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
    }
    .recent-single {
  display: flex;
  gap: 1.5rem;
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #333;
  cursor: pointer;
  max-width: 500px;
  transition: border-color 0.2s;
}
.recent-single:hover { border-color: var(--accent); }
.recent-single img { width: 120px; height: 160px; object-fit: cover; flex-shrink: 0; }
.recent-info { padding: 1rem; display: flex; flex-direction: column; justify-content: center; gap: 0.6rem; }
.chapter-name { font-size: 1.1rem; font-weight: 800; }
.read-btn { display: inline-block; background: var(--accent); color: white; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 700; width: fit-content; }
    button:hover { background: var(--accent); color: white; }

    .page { display: none; }
    .active { display: block; }

    .hero { text-align: center; padding: 5rem 1rem 3rem; background: linear-gradient(to bottom, #1a1a1a, #0f0f0f); }
    .section { padding: 3rem 2rem; max-width: 1300px; margin: 0 auto; }

    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 2rem;
    }
    .chapter-card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid #333;
    }
    .chapter-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(230, 144, 57, 0.4);
      border-color: var(--accent);
    }
    .chapter-card img {
      width: 100%;
      height: 340px;
      object-fit: cover;
    }
    .chapter-card h3 { padding: 1rem; text-align: center; font-size: 1.15rem; }

    .title-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }
    .title-card {
      background: #222;
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
      border: 1px solid #333;
    }
    .title-card:hover { transform: scale(1.05); border-color: var(--accent); }
    .title-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 8px;
    }

    /* ==================== READER PAGE ==================== */
    #reader-page {
      display: none !important;
      flex-direction: column;
      height: 100vh;
      background: #0a0a0a;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
    }
    #reader-page.active {
      display: flex !important;
    }
    #reader-page.active ~ footer {
      display: none;
    }
    body:has(#reader-page.active) footer {
      display: none;
    }
    .reader-header {
      padding: 0.5rem 1rem;
      background: #111;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      border-bottom: 3px solid #333;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .reader-header button {
      padding: 8px 14px;
      font-size: 0.9rem;
    }
    .reader-header h2 {
      font-size: 1.3rem;
    }
    .pages-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      padding: 10px;
      overflow: auto;
      background: #050505;
    }
    .comic-page {
      max-width: 90vw;
      max-height: 85vh;
      box-shadow: 0 0 40px rgba(0,0,0,0.95);
      background: white;
      cursor: pointer;
      object-fit: contain;
    }
    .controls {
      background: #111;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      border-top: 3px solid #333;
      flex-shrink: 0;
      flex-direction: row-reverse;
    }
    .page-info { 
      font-size: 1.5rem; 
      font-weight: bold; 
      min-width: 220px; 
      text-align: center;
      padding: 8px 16px;
      background: #1a1a1a;
      border-radius: 8px;
    }

    @media (max-width: 900px) {
      .pages-container { 
        flex-direction: column; 
        gap: 4px;
        padding: 5px;
        margin-top: 10px;
      }
      .comic-page { 
        max-width: 100%; 
        max-height: 70vh;
        height: auto; 
      }
      .controls {
        flex-direction: row-reverse;
        gap: 0.5rem;
        padding: 0.75rem;
      }
      .controls button {
        padding: 10px 16px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <img src="https://via.placeholder.com/70x70/222/fff?text=LOGO" alt="Logo" class="logo">
	<h1 style="cursor:pointer;" onclick="showPage('home')">SPACE COP</h1>    <!--<div class="nav">
      <button onclick="showPage('chapters')">All Chapters</button>
    </div>-->
  </header>
  

  <!-- HOME PAGE -->
  <div id="home" class="page active">
    <section class="hero">
      <h2>Welcome</h2>
      <!--<p>A personal independent Manga</p>-->
    </section>
    
    <section class="section">
      <h2 style="margin-bottom: 1.5rem; text-align:center;">New</h2>
      <div class="chapter-grid" id="recent-grid"></div>
    </section>

    <section class="section titles">
      <h2 style="margin-bottom: 1.5rem; text-align:center;">Series</h2>
      <div class="title-cards">
        <div class="title-card" onclick="filterBySeries(1)">
          <img src="https://via.placeholder.com/600x400/333/fff?text=SERIES+1" alt="Series 1">
          <h3 style="margin-top: 1rem;">"Chapter 1"</h3>
        </div>
        <div class="title-card" onclick="filterBySeries(2)">
          <img src="https://via.placeholder.com/600x400/333/fff?text=SERIES+2" alt="Series 2">
          <h3 style="margin-top: 1rem;">Series Title Two</h3>
        </div>
      </div>
    </section>
  </div>
  
<footer>
  <center><p>© 2026 Space Cop. All rights reserved.</p></center>
</footer>

  <!-- ALL CHAPTERS PAGE -->
  <div id="chapters" class="page">
    <div class="section">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h2 id="chapters-title">Chapters</h2>
        <button onclick="showPage('home')">← Back</button>
      </div>
      <div class="chapter-grid" id="all-chapters-grid"></div>
    </div>
  </div>

  <!-- READER PAGE -->
  <div id="reader-page">
    <div class="reader-header">
      <button onclick="exitReader()">← Top</button>
      <h2 id="reader-chapter-title" style="flex:1;">Chapter Title</h2>
    </div>
    
    <div class="pages-container" id="reader-pages-container"></div>
    
    <div class="controls">
      <button onclick="nextSpread()">Next →</button>
      <button onclick="prevSpread()">← Prev</button>
    </div>
  </div>

  <script>
    const chapters = [
  {
    id: 1,
    title: "Chapter 1",
    series: 1,
    thumb: "1824.jpg",
    pages: [
      "1814.jpg","1815.jpg","1816.jpg","1817.jpg",
      "1818.jpg","1819.jpg","1820.jpg","1821.jpg",
      "1822.jpg","1823.jpg","1824.jpg","1825.jpg",
      "1826.jpg","1827.jpg","1828.jpg","1829.jpg"
    ]
  },
];

    let currentIndex = 0;
    let currentSpread = 0;

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('reader-page').classList.remove('active');
      const page = document.getElementById(pageId);
      page.classList.add('active');
    }

    function renderRecent() {
  const recent = chapters[chapters.length - 1];
  const recentIndex = chapters.length - 1;
  document.getElementById('recent-grid').innerHTML = `
    <center><div class="recent-single" onclick="startReading(${recentIndex})">
      <img src="${recent.thumb}" alt="${recent.title}">
      <div class="recent-info">
        <span class="chapter-name">${recent.title}</span>
        <span class="read-btn">Read Now →</span>
      </div>
    </div></center>
  `;
}

    function renderAllChapters(filtered = chapters) {
      document.getElementById('all-chapters-grid').innerHTML = filtered.map((ch, i) => `
        <div class="chapter-card" onclick="startReading(${chapters.indexOf(ch)})">
          <img src="${ch.thumb}" alt="${ch.title}">
          <h3>${ch.title}</h3>
        </div>
      `).join('');
    }

    function filterBySeries(seriesId) {
      const filtered = chapters.filter(ch => ch.series === seriesId);
      renderAllChapters(filtered);
      const seriesNames = { 1: 'Series 1', 2: 'Series 2' };
      document.getElementById('chapters-title').textContent = seriesNames[seriesId] || 'Chapters';
      showPage('chapters');
    }

    function showAllChapters() {
      renderAllChapters(chapters);
      document.getElementById('chapters-title').textContent = 'All Chapters';
      showPage('chapters');
    }

    function startReading(index) {
      currentIndex = index;
      currentSpread = 0;
      const ch = chapters[index];
      document.getElementById('reader-chapter-title').textContent = ch.title;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('reader-page').classList.add('active');
      renderCurrentSpread();
    }

    function exitReader() {
      showPage('home');
    }

    function renderCurrentSpread() {
      const ch = chapters[currentIndex];
      const container = document.getElementById('reader-pages-container');
      container.innerHTML = '';

      const start = currentSpread;
      const toShow = Math.min(2, ch.pages.length - start);

      // Add images in reverse order so right page (first) appears on the left
      for (let i = toShow - 1; i >= 0; i--) {
        const img = document.createElement('img');
        img.src = ch.pages[start + i];
        img.className = 'comic-page';
        img.onclick = nextSpread;
        container.appendChild(img);
      }

      document.getElementById('reader-page-counter').textContent = `${start+1} — ${start+toShow} / ${ch.pages.length}`;
    }

    function nextSpread() {
      const ch = chapters[currentIndex];
      if (currentSpread + 2 < ch.pages.length) currentSpread += 2;
      else if (currentSpread + 1 < ch.pages.length) currentSpread += 1;
      else { nextChapter(); return; }
      renderCurrentSpread();
    }

    function prevSpread() {
      currentSpread = Math.max(0, currentSpread - 2);
      renderCurrentSpread();
    }

    function nextChapter() {
      if (currentIndex < chapters.length - 1) {
        currentIndex++;
        currentSpread = 0;
        document.getElementById('reader-chapter-title').textContent = chapters[currentIndex].title;
        renderCurrentSpread();
      }
    }

    function prevChapter() {
      if (currentIndex > 0) {
        currentIndex--;
        currentSpread = 0;
        document.getElementById('reader-chapter-title').textContent = chapters[currentIndex].title;
        renderCurrentSpread();
      }
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (!document.getElementById('reader-page').classList.contains('active')) return;
      if (e.key === 'ArrowRight') prevSpread();
      if (e.key === 'ArrowLeft') nextSpread();
      if (e.key === 'Escape') exitReader();
    });

    // Initialize
    renderRecent();
    renderAllChapters();
    showPage('home');
  </script>
</body>
</html>
