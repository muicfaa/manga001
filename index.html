<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hira</title>
  <style>
    :root { --accent: #e69039; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: #0f0f0f;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
 
    /* ========== HEADER ========== */
    header {
      background: #111;
      padding: 1rem 2rem;
      border-bottom: 4px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      height: 70px;
      width: 70px;
      border: 3px solid var(--accent);
      border-radius: 12px;
      object-fit: contain;
      cursor: pointer;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -1px;
      cursor: pointer;
    }
 
    /* reader page hides header and footer */
    body.reader-open header,
    body.reader-open footer { display: none; }
 
    /* ========== PAGES ========== */
    .page { display: none; }
    .page.active { display: block; }
 
    .hero {
      text-align: center;
      padding: 5rem 1rem 3rem;
      background: linear-gradient(to bottom, #1a1a1a, #0f0f0f);
    }
 
    .section {
      padding: 3rem 2rem;
      max-width: 1300px;
      margin: 0 auto;
    }
 
    /* ========== RECENT ========== */
    .recent-single {
      display: flex;
      gap: 1.5rem;
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
      cursor: pointer;
      max-width: 500px;
      margin: 0 auto;
      transition: border-color 0.2s;
    }
    .recent-single:hover { border-color: var(--accent); }
    .recent-single img { width: 120px; height: 160px; object-fit: cover; flex-shrink: 0; }
    .recent-info {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.6rem;
    }
    .chapter-name { font-size: 1.1rem; font-weight: 800; }
    .read-btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      width: fit-content;
    }
 
    /* ========== SERIES / CHAPTERS ========== */
    .title-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }
    .title-card {
      background: #222;
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
      border: 1px solid #333;
    }
    .title-card:hover { transform: scale(1.05); border-color: var(--accent); }
    .title-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 8px;
    }
 
    footer {
      text-align: center;
      padding: 2rem;
      color: #666;
      font-size: 0.9rem;
    }
 
    /* ========== READER ========== */
    #reader-page {
      display: none;
      flex-direction: column;
      background: #000;
    }
    #reader-page.active { display: flex; }
 
    .reader-header {
      background: #111;
      border-bottom: 3px solid var(--accent);
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .reader-header .logo { height: 48px; width: 48px; }
    .reader-header h1 { font-size: 1.6rem; }
 
    .reader-img-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      cursor: pointer;
      background: #000;
    }
 
    .reader-img {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }
 
    /* ========== BOTTOM NAV ========== */
    .reader-nav {
      display: flex;
      background: #111;
      border-top: 2px solid #222;
      position: sticky;
      bottom: 0;
      z-index: 100;
    }
    .reader-nav-btn {
      flex: 1;
      padding: 15px 0;
      background: #111;
      border: none;
      color: #aaa;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.03em;
    }
    .reader-nav-btn:hover { background: #1e1e1e; color: var(--accent); }
    .reader-nav-btn:active { background: #252525; }
    .nav-divider { width: 1px; background: #222; }
 
  </style>
</head>
<body>
 
  <!-- HEADER -->
  <header>
    <img src="icon1.jpg" alt="Logo" class="logo" onclick="showPage('home')">
    <h1 onclick="showPage('home')">Hira</h1>
  </header>
 
  <!-- HOME PAGE -->
  <div id="home" class="page active">
 
    <section class="hero">
      <h2>Welcome</h2>
    </section>
 
    <section class="section">
      <h2 style="margin-bottom:1.5rem; text-align:center;">New</h2>
      <div id="recent-grid"></div>
    </section>
 
    <section class="section">
      <h2 style="margin-bottom:1.5rem; text-align:center;">Series</h2>
      <div class="title-cards">
        <div class="title-card" onclick="filterBySeries(1)">
          <img src="icon1.jpg" alt="Egg-Sapien">
          <h3 style="margin-top:1rem;">Egg-Sapienと便秘の子どもたち</h3>
        </div>
        <!-- <div class="title-card" onclick="filterBySeries(2)">
          <img src="Metal-01.jpg" alt="Echo-Metal">
          <h3 style="margin-top:1rem;">まだ文のみ 1990 Metal</h3>
        </div>-->
      </div>
    </section>
 
  </div>
 
  <!-- CHAPTERS PAGE -->
  <div id="chapters" class="page">
    <div class="section">
      <h2 style="margin-bottom:1.5rem;">目次</h2>
      <div class="title-cards" id="all-chapters-grid"></div>
    </div>
  </div>
 
  <footer>
    <p>© 2026</p>
  </footer>
 
  <!-- READER -->
  <div id="reader-page">
 
    <div class="reader-header">
      <img src="icon1.jpg" alt="Logo" class="logo" onclick="showPage('home')">
      <h1 onclick="exitReader(); showPage('home');">Hira</h1>
    </div>
 
    <div class="reader-img-wrap" onclick="nextPage()">
      <img id="reader-img" class="reader-img" alt="Page" />
    </div>
 
    <div class="reader-nav">
      <button class="reader-nav-btn" id="btn-next" onclick="nextPage()">← Next</button>
      <div class="nav-divider"></div>
      <button class="reader-nav-btn" id="btn-prev" onclick="prevPage()">Back →</button>
    </div>
 
  </div>
 
  <script>
    // ============================================================
    //  YOUR DATA — only edit this when adding new chapters
    // ============================================================
    const chapters = [
     
      <!-- {
        id: 2,
        title: "まだ文のみ 1990 Metal",
        series: 2,
        thumb: "Metal-01.jpg",
        pages: [
          "Metal-01.jpg","Metal-02.jpg","Metal-03.jpg","Metal-04.jpg",
          "Metal-05.jpg","Metal-06.jpg","Metal-07.jpg","Metal-08.jpg",
          "Metal-09.jpg","Metal-10.jpg","Metal-11.jpg","Metal-12.jpg",
          "Metal-13.jpg","Metal-14.jpg","Metal-15.jpg","Metal-16.jpg",
          "Metal-17.jpg","Metal-18.jpg","Metal-19.jpg","Metal-20.jpg",
          "m.jpg"
        ]
      },-->
       {
        id: 1,
        title: "第一話：入学式出れなかった",
        series: 1,
        thumb: "icon2.jpg",
        pages: [
          "1.jpg","2.jpg","3.jpg","4.jpg",
          "5.jpg","6.jpg","7.jpg","8.jpg",
          "9.jpg","10.jpg","11.jpg","12.jpg",
          "13.jpg","14.jpg","thanku.jpg"
        ]
      },
    ];
    // ============================================================
 
    let currentIndex = 0;
    let currentPage  = 0;
 
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('reader-page').classList.remove('active');
      document.body.classList.remove('reader-open');
      document.getElementById(pageId).classList.add('active');
      window.scrollTo(0, 0);
    }
 
    function renderRecent() {
      const recent = chapters[chapters.length - 1];
      const recentIndex = chapters.length - 1;
      document.getElementById('recent-grid').innerHTML = `
        <div class="recent-single" onclick="startReading(${recentIndex})">
          <img src="${recent.thumb}" alt="${recent.title}">
          <div class="recent-info">
            <span class="chapter-name">${recent.title}</span>
            <span class="read-btn">Read Now →</span>
          </div>
        </div>
      `;
    }
 
    function filterBySeries(seriesId) {
      const filtered = chapters.filter(ch => ch.series === seriesId);
      document.getElementById('all-chapters-grid').innerHTML = filtered.map(ch => {
        const i = chapters.indexOf(ch);
        return `
          <div class="title-card" onclick="startReading(${i})">
            <img src="${ch.thumb}" alt="${ch.title}">
            <h3 style="margin-top:1rem;">${ch.title}</h3>
          </div>
        `;
      }).join('');
      showPage('chapters');
      history.pushState({ page: 'chapters' }, '');
    }
 
    function startReading(index) {
      currentIndex = index;
      currentPage  = 0;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('reader-page').classList.add('active');
      document.body.classList.add('reader-open');
      window.scrollTo(0, 0);
      showPageImage();
      history.pushState({ reader: true, page: 0 }, '');
    }
 
    function exitReader() {
      document.getElementById('reader-page').classList.remove('active');
      document.body.classList.remove('reader-open');
    }
 
    function showPageImage() {
      const ch = chapters[currentIndex];
      const img = document.getElementById('reader-img');

    window.scrollTo(document.documentElement.scrollWidth, 0);
      
      // flash buttons orange
      document.querySelectorAll('.reader-nav-btn').forEach(btn => {
        btn.style.color = 'var(--accent)';
        btn.style.background = '#1e1e1e';
      });
 
      img.src = ch.pages[currentPage];
 
      // reset buttons when image finishes loading
      img.onload = () => {
        document.querySelectorAll('.reader-nav-btn').forEach(btn => {
          btn.style.color = '';
          btn.style.background = '';
        });
        window.scrollTo(0, 0);
      };
 
      // preload next page
      if (currentPage + 1 < ch.pages.length) {
        const preload = new Image();
        preload.src = ch.pages[currentPage + 1];
      }
    }
 
    function nextPage() {
      const ch = chapters[currentIndex];
      if (currentPage < ch.pages.length - 1) {
        currentPage++;
        showPageImage();
        history.pushState({ reader: true, page: currentPage }, '');
      } else {
        exitReader();
        showPage('home');
      }
    }
 
    function prevPage() {
      history.back();
    }
 
    // Browser back button
    window.addEventListener('popstate', () => {
      if (document.getElementById('reader-page').classList.contains('active')) {
        if (currentPage > 0) {
          currentPage--;
          showPageImage();
        } else {
          exitReader();
          showPage('home');
        }
      } else if (document.getElementById('chapters').classList.contains('active')) {
        showPage('home');
      }
    });
 
    // Keyboard
    document.addEventListener('keydown', e => {
      if (!document.getElementById('reader-page').classList.contains('active')) return;
      if (e.key === 'ArrowLeft' || e.key === ' ') nextPage();
      if (e.key === 'ArrowRight') prevPage();
      if (e.key === 'Escape') { exitReader(); showPage('home'); }
    });
 
    // Init
    renderRecent();
    showPage('home');
  </script>
</body>
</html>
