<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Manga</title>
  <style>
    :root { --accent: #e69039; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: #0f0f0f;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
 
    /* ========== HEADER ========== */
    header {
      background: #111;
      padding: 1rem 2rem;
      border-bottom: 4px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      height: 70px;
      width: 70px;
      border: 3px solid var(--accent);
      border-radius: 12px;
      object-fit: contain;
      cursor: pointer;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -1px;
      cursor: pointer;
    }
 
    .page { display: none; }
    .page.active { display: block; }
 
    .hero {
      text-align: center;
      padding: 5rem 1rem 3rem;
      background: linear-gradient(to bottom, #1a1a1a, #0f0f0f);
    }
 
    .section {
      padding: 3rem 2rem;
      max-width: 1300px;
      margin: 0 auto;
    }
 
    /* ========== RECENT ========== */
    .recent-single {
      display: flex;
      gap: 1.5rem;
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
      cursor: pointer;
      max-width: 500px;
      margin: 0 auto;
      transition: border-color 0.2s;
    }
    .recent-single:hover { border-color: var(--accent); }
    .recent-single img { width: 120px; height: 160px; object-fit: cover; flex-shrink: 0; }
    .recent-info {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.6rem;
    }
    .chapter-name { font-size: 1.1rem; font-weight: 800; }
    .read-btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      width: fit-content;
    }
 
    /* ========== SERIES / CHAPTERS ========== */
    .title-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }
    .title-card {
      background: #222;
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
      border: 1px solid #333;
    }
    .title-card:hover { transform: scale(1.05); border-color: var(--accent); }
    .title-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 8px;
    }
 
    footer {
      text-align: center;
      padding: 2rem;
      color: #666;
      font-size: 0.9rem;
    }
 
    /* ========== READER ========== */
    #reader-page {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      flex-direction: column;
    }
    #reader-page.active { display: flex; }
 
    .reader-header {
      background: #111;
      border-bottom: 3px solid var(--accent);
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }
    .reader-header .logo { height: 48px; width: 48px; }
    .reader-header h1 { font-size: 1.6rem; }
 
    .reader-img-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      cursor: pointer;
    }
 
    .reader-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }
 
    /* ========== BOTTOM NAV ========== */
    .reader-nav {
      display: flex;
      background: #111;
      border-top: 2px solid #222;
      flex-shrink: 0;
    }
    .reader-nav-btn {
      flex: 1;
      padding: 18px 0;
      background: #111;
      border: none;
      color: #aaa;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.03em;
    }
    .reader-nav-btn:hover { background: #1e1e1e; color: var(--accent); }
    .reader-nav-btn:active { background: #252525; }
    .nav-divider { width: 1px; background: #222; }
 
  </style>
</head>
<body>
 
  <!-- HEADER -->
  <header>
    <img src="icon1.jpg?text=LOGO" alt="Logo" class="logo" onclick="showPage('home')">
    <h1 onclick="showPage('home')">MANGA
</h1>
  </header>
 
  <!-- HOME PAGE -->
  <div id="home" class="page active">
 
    <section class="hero">
      <h2>Welcome</h2>
    </section>
 
    <section class="section">
      <h2 style="margin-bottom:1.5rem; text-align:center;">New</h2>
      <div id="recent-grid"></div>
    </section>
 
    <section class="section">
      <h2 style="margin-bottom:1.5rem; text-align:center;">Series</h2>
      <div class="title-cards">
        <div class="title-card" onclick="filterBySeries(1)">
          <img src="icon1.jpg" alt="Drop the Egg">
          <h3 style="margin-top:1rem;">Egg-Sapien</h3>
        </div>
      </div>
    </section>
 
  </div>
 
  <!-- CHAPTERS PAGE -->
  <div id="chapters" class="page">
    <div class="section">
      <h2 style="margin-bottom:1.5rem;">目次</h2>
      <div class="title-cards" id="all-chapters-grid"></div>
    </div>
  </div>
 
  <footer>
    <p>© Hisashi 2025. All rights reserved.</p>
  </footer>

      <img src="icon1.jpg?text=LOGO" alt="Logo" class="logo" onclick="history.back()">
        <h1 onclick="exitReader(); showPage('home');">MANGA</h1>    </div>
 
    <div class="reader-img-wrap" onclick="nextPage()">

      <button class="reader-nav-btn" onclick="nextPage()">← Next</button>
      <div class="nav-divider"></div>
      <button class="reader-nav-btn" onclick="prevPage()">Back →</button>

<!-- READER -->
<div id="reader-page" style="display:none; position:fixed; inset:0; background:#000; z-index:9999; flex-direction:column;">
  <div style="background:#111; border-bottom:3px solid #e69039; padding:0.8rem 1rem; display:flex; align-items:center; gap:1rem; flex-shrink:0; position:relative;">
    <img src="icon1.jpg" alt="Logo" style="height:50px; width:50px; border:3px solid #e69039; border-radius:8px; cursor:pointer;" onclick="exitReader()">
    <h1 onclick="exitReader(); showPage('home');" style="font-size:2rem; cursor:pointer;">MANGA</h1>
    <div style="margin-left:auto; color:#888; font-size:0.95rem;" id="page-counter">1 / 14</div>
    <div id="progress-bar" style="position:absolute; bottom:-3px; left:0; height:3px; background:#e69039; width:0%; transition:width 0.2s;"></div>
  </div>

  <div onclick="nextPage()" style="flex:1; display:flex; justify-content:center; align-items:center; overflow:hidden; background:#000; cursor:pointer;">
    <img id="reader-img" style="max-width:100%; max-height:100%; object-fit:contain;" alt="Manga Page">
  </div>

  <div style="display:flex; background:#111; border-top:2px solid #222;">
    <button onclick="nextPage()" style="flex:1; padding:18px; background:#111; border:none; color:#aaa; font-size:1.1rem;">← Next</button>
        <div style="width:1px; background:#222;"></div>
    <button onclick="prevPage()" style="flex:1; padding:18px; background:#111; border:none; color:#aaa; font-size:1.1rem;">Back →</button>

  </div>
</div>
  
  
  <script>
    // ============================================================
    //  YOUR DATA — only edit this when adding new chapters
    // ============================================================
    const chapters = [
    {
      id: 1,
      title: "第一話：サービスショットあり",
      series: 1,
      thumb: "icon2.jpg",
      pages: Array.from({length: 14}, (_, i) => `${i+1}.jpg`)
    }
    // Add more chapters here later like:
    // {
    //   id: 2,
    //   title: "第二話：...",
    //   series: 1,
    //   thumb: "icon3.jpg",
    //   pages: Array.from({length: 20}, (_, i) => `${i + 15}.jpg`)
    // }
  ];

  let currentChapterIndex = 0;
  let currentPage = 0;

  function startReading(chapterIndex) {
    currentChapterIndex = chapterIndex;
    currentPage = 0;
    document.getElementById('reader-page').style.display = 'flex';
    loadCurrentPage();
  }

  function exitReader() {
    document.getElementById('reader-page').style.display = 'none';
  }

  function loadCurrentPage() {
    const chapter = chapters[currentChapterIndex];
    if (!chapter) return;

    document.getElementById('reader-img').src = chapter.pages[currentPage];
    document.getElementById('page-counter').textContent = `${currentPage + 1} / ${chapter.pages.length}`;
    document.getElementById('progress-bar').style.width = `${((currentPage + 1) / chapter.pages.length) * 100}%`;

    // Preload next
    if (currentPage + 1 < chapter.pages.length) {
      const pre = new Image();
      pre.src = chapter.pages[currentPage + 1];
    }
  }

  function nextPage() {
    const chapter = chapters[currentChapterIndex];
    if (currentPage < chapter.pages.length - 1) {
      currentPage++;
      loadCurrentPage();
    } else {
      exitReader();
    }
  }

  function prevPage() {
    if (currentPage > 0) {
      currentPage--;
      loadCurrentPage();
    } else {
      exitReader();
    }
  }

  // Japanese style keyboard
  document.addEventListener('keydown', e => {
    if (document.getElementById('reader-page').style.display !== 'flex') return;
    if (e.key === 'ArrowLeft' || e.key === ' ') nextPage();
    if (e.key === 'ArrowRight') prevPage();
    if (e.key === 'Escape') exitReader();
  });

  // Make sure your chapter thumbnails call the right function
  // Example: onclick="startReading(0)" for first chapter
    // Init
    renderRecent();
    showPage('home');
  </script>
</body>
</html>
