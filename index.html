<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SPACE COP</title>
  <style>
    :root { --accent: #e69039; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: #0f0f0f;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
 
    /* ========== HEADER ========== */
    header {
      background: #111;
      padding: 1rem 2rem;
      border-bottom: 4px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      height: 70px;
      width: 70px;
      border: 3px solid var(--accent);
      border-radius: 12px;
      object-fit: contain;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -1px;
      cursor: pointer;
    }
 
    body.reader-open header,
    body.reader-open footer { display: none; }
 
    .page { display: none; }
    .page.active { display: block; }
 
    .hero {
      text-align: center;
      padding: 5rem 1rem 3rem;
      background: linear-gradient(to bottom, #1a1a1a, #0f0f0f);
    }
 
    .section {
      padding: 3rem 2rem;
      max-width: 1300px;
      margin: 0 auto;
    }
 
    /* ========== RECENT ========== */
    .recent-single {
      display: flex;
      gap: 1.5rem;
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
      cursor: pointer;
      max-width: 500px;
      margin: 0 auto;
      transition: border-color 0.2s;
    }
    .recent-single:hover { border-color: var(--accent); }
    .recent-single img { width: 120px; height: 160px; object-fit: cover; flex-shrink: 0; }
    .recent-info {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.6rem;
    }
    .chapter-name { font-size: 1.1rem; font-weight: 800; }
    .read-btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      width: fit-content;
    }
 
    /* ========== SERIES ========== */
    .title-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }
    .title-card {
      background: #222;
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
      border: 1px solid #333;
    }
    .title-card:hover { transform: scale(1.05); border-color: var(--accent); }
    .title-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 8px;
    }
 
    footer {
      text-align: center;
      padding: 2rem;
      color: #666;
      font-size: 0.9rem;
    }
 
    /* ========== READER ========== */
    #reader-page {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      overflow: hidden;
      cursor: pointer;
    }
    #reader-page.active { display: block; }
 
    .reader-img {
      width: 100vw;
      height: 100dvh;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }
 
  </style>
</head>
<body>
 
  <!-- HEADER -->
  <header>
    <img src="1827.jpg?text=LOGO" alt="Logo" class="logo">
    <h1 onclick="showPage('home')">SPACE COP</h1>
  </header>
 
  <!-- HOME PAGE -->
  <div id="home" class="page active">
 
    <section class="hero">
      <h2>Welcome</h2>
    </section>
 
    <section class="section">
      <h2 style="margin-bottom: 1.5rem; text-align:center;">New</h2>
      <div id="recent-grid"></div>
    </section>
 
    <section class="section">
      <h2 style="margin-bottom: 1.5rem; text-align:center;">Series</h2>
      <div class="title-cards">
        <div class="title-card" onclick="filterBySeries(1)">
          <img src="1814.jpg" alt="Chapter 1">
          <h3 style="margin-top: 1rem;">Chapter 1</h3>
        </div>
      </div>
    </section>
 
  </div>
 <div id="chapters" class="page">
  <div class="section">
    <h2 style="margin-bottom:1.5rem;">Chapters</h2>
    <div class="title-cards" id="all-chapters-grid"></div>
  </div>
</div>
  <footer>
    <p>© 2026 Space Cop. All rights reserved.</p>
  </footer>
 
  <!-- READER -->
  <div id="reader-page">
    <img id="reader-img" class="reader-img" alt="Page" />
  </div>
 
  <script>
    // ============================================================
    //  YOUR DATA — only edit this when adding new chapters
    // ============================================================
    const chapters = [
      {
        id: 1,
        title: "Chapter 1",
        series: 1,
        thumb: "1814.jpg",
        pages: [
          "1814.jpg","1815.jpg","1816.jpg","1817.jpg",
          "1820.jpg","1821.jpg",
          "1822.jpg","1823.jpg","1824.jpg","1825.jpg",
          "1826.jpg","1827.jpg","1828.jpg","1829.jpg"
        ]
      },
    ];
    // ============================================================
 
    let currentIndex = 0;
    let currentPage  = 0;
 
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      window.scrollTo(0, 0);
    }
 function filterBySeries(seriesId) {
  const filtered = chapters.filter(ch => ch.series === seriesId);
  renderChapterGrid(filtered);
  showPage('chapters');
}

function renderChapterGrid(list) {
  document.getElementById('all-chapters-grid').innerHTML = list.map(ch => {
    const i = chapters.indexOf(ch);
    return `
      <div class="title-card" onclick="startReading(${i})">
        <img src="${ch.thumb}" alt="${ch.title}">
        <h3 style="margin-top:1rem;">${ch.title}</h3>
      </div>
    `;
  }).join('');
}
    function renderRecent() {
      const recent = chapters[chapters.length - 1];
      const recentIndex = chapters.length - 1;
      document.getElementById('recent-grid').innerHTML = `
        <div class="recent-single" onclick="startReading(${recentIndex})">
          <img src="${recent.thumb}" alt="${recent.title}">
          <div class="recent-info">
            <span class="chapter-name">${recent.title}</span>
            <span class="read-btn">Read Now →</span>
          </div>
        </div>
      `;
    }
 
    function startReading(index) {
      currentIndex = index;
      currentPage  = 0;
      document.getElementById('reader-page').classList.add('active');
      document.body.classList.add('reader-open');
      showPageImage();
      history.pushState({ reader: true }, '');
    }
 
    function exitReader() {
      document.getElementById('reader-page').classList.remove('active');
      document.body.classList.remove('reader-open');
    }
 
    function showPageImage() {
  const ch = chapters[currentIndex];
  document.getElementById('reader-img').src = ch.pages[currentPage];
  // preload next page in background
  if (currentPage + 1 < ch.pages.length) {
    const preload = new Image();
    preload.src = ch.pages[currentPage + 1];
  }
}
 
    function nextPage() {
  const ch = chapters[currentIndex];
  if (currentPage < ch.pages.length - 1) {
    currentPage++;
    showPageImage();
    history.pushState({ reader: true, page: currentPage }, '');
  } else {
    history.back();
  }
}
 
    // Click anywhere = next page
    document.getElementById('reader-page').onclick = nextPage;
 
    // Browser back button = exit reader
    window.addEventListener('popstate', (e) => {
  if (document.getElementById('reader-page').classList.contains('active')) {
    if (currentPage > 0) {
      currentPage--;
      showPageImage();
    } else {
      exitReader();
    }
  }
});
 
    // Keyboard
    document.addEventListener('keydown', e => {
      if (!document.getElementById('reader-page').classList.contains('active')) return;
      if (e.key === 'ArrowRight' || e.key === ' ') nextPage();
      if (e.key === 'ArrowLeft') {
        if (currentPage > 0) { currentPage--; showPageImage(); }
      }
      if (e.key === 'Escape') history.back();
    });
 
    // Init
    renderRecent();
    showPage('home');
  </script>
</body>
</html>
